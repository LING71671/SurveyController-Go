schema_version: 1
survey:
  url: "https://www.wjx.cn/vm/example.aspx"
  provider: "wjx"
run:
  target: 1
  concurrency: 1
  mode: http
questions:
  - id: q1
    kind: single
    options:
      weights:
        - option_id: q1_a
          weight: 1
  - id: q2
    kind: multiple
    options:
      min_selected: 2
      max_selected: 2
      weights:
        - option_id: q2_a
          weight: 1
        - option_id: q2_b
          weight: 1
        - option_id: q2_c
          weight: 0
  - id: q4
    kind: rating
    options:
      weights:
        - option_id: q4_5
          weight: 1
