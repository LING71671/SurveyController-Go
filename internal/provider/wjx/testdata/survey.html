<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>问卷星 HTML 样例</title>
  </head>
  <body>
    <main id="divQuestion">
      <h1 data-survey-title>问卷星 HTML 样例</h1>

      <section data-question="q1" data-number="1" data-kind="single" data-required="true">
        <h2 data-question-title>你更喜欢哪种运行方式？</h2>
        <ul>
          <li data-option="q1_a" data-value="browser">浏览器</li>
          <li data-option="q1_b" data-value="http">HTTP</li>
        </ul>
      </section>

      <section data-question="q2" data-number="2" data-kind="multiple">
        <h2 data-question-title>你关注哪些能力？</h2>
        <label data-option="q2_a">解析</label>
        <label data-option="q2_b">配置</label>
        <label data-option="q2_c">运行</label>
      </section>

      <section data-question="q3" data-number="3" data-kind="text">
        <h2 data-question-title>补充说明</h2>
      </section>

      <section data-question="q4" data-number="4" data-kind="rating" data-required="true">
        <h2 data-question-title>请给出评分</h2>
        <span data-option="q4_1" data-value="1">1</span>
        <span data-option="q4_5" data-value="5">5</span>
      </section>

      <section data-question="q5" data-number="5" data-kind="matrix">
        <h2 data-question-title>请评价以下维度</h2>
        <table>
          <thead>
            <tr>
              <th>维度</th>
              <th data-option="q5_c1" data-value="1">不满意</th>
              <th data-option="q5_c5" data-value="5">满意</th>
            </tr>
          </thead>
          <tbody>
            <tr data-row="q5_r1">
              <th>体验</th>
            </tr>
            <tr data-row="q5_r2">
              <th>性能</th>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </body>
</html>
